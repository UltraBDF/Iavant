name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check Formatting (Prettier)
        run: npx prettier --check .

      - name: Linting (ESLint)
        run: npm run lint

      # - name: Type-checking (TypeScript)
      #   run: npm run type-check

      # On s'en fiche un peu en vrai pour le moment....
      # - name: Unit Tests (Vitest)
      #   run: npm run test

      - name: Build Check
        run: npm run build